  });
  tr.test('tracer_resets_when_out_of_bounds', () => {
    const config = { nx: 16, ny: 8, nz: 8, u_inf: 0.05, rho0: 1.0, viscosity: 0.02, obstacles: [] };
    const solver = new LbmSolver(config);
    const tracer = new StreamlineTracer(1, 4);
    tracer.particles[0].position = { x: 100, y: 0, z: 0 };
    tracer.step(solver, 1.0);
    tr.assert(tracer.particles[0].position.x < 5, `should reset to inlet, got x=${tracer.particles[0].position.x}`);
  });
  tr.test('obstacles_divert_particles', () => {
    const config = { nx: 32, ny: 16, nz: 16, u_inf: 0.1, rho0: 1.0, viscosity: 0.02,
      obstacles: [obstacleSphere({ x: 6, y: 0, z: 0 }, 3)] };
    const solver = new LbmSolver(config);
    for (let i = 0; i < 200; i++) solver.step();
    const tracer = new StreamlineTracer(1, 4);
    tracer.particles[0].position = { x: -10, y: 0.5, z: 0 };
    for (let i = 0; i < 20; i++) tracer.step(solver, 1.0);
    tr.assert(Math.abs(tracer.particles[0].position.y) > 0.1,
      `particle deflected off sphere, y = ${tracer.particles[0].position.y}`);
  });

  // -- scenes.rs --
  tr.test('uniform_flow_never_explodes', () => {
    const r = runUniform(500);
    tr.assert(r.maxDensity < 1.5, `density should stay near 1, got max=${r.maxDensity}`);
    tr.assert(r.minDensity > 0.5, `density should stay near 1, got min=${r.minDensity}`);
    tr.assert(r.maxVelocity < 0.5, `velocity should stay near inlet, got max=${r.maxVelocity}`);
  });
  tr.test('sphere_produces_drag_in_flow_direction', () => {
    const r = runSphere(500);
    tr.assert(r.drag_x > 0, `expected positive drag on sphere, got ${r.drag_x}`);
  });
  tr.test('sphere_density_stays_bounded', () => {
    const r = runSphere(500);
    tr.assert(r.maxDensity < 1.5, `rho max ${r.maxDensity} > 1.5`);
    tr.assert(r.minDensity > 0.5, `rho min ${r.minDensity} < 0.5`);
  });
  tr.test('sphere_cd_in_physical_range', () => {
    const r = runSphere(500);
    tr.assert(r.cd > 0.1, `cd too low: ${r.cd}`);
    tr.assert(r.cd < 3.0, `cd too high: ${r.cd}`);
  });
}

/* =====================================================================
   SECTION 11 — Camera + main app
   ===================================================================== */

function makeCamera(spec) {
  // Orbit camera centered on the volume. The volume's floor sits at
  // y = -spec.ny / 2 in world space; we clamp the camera so the user
  // can never dip below the floor (no seeing underneath the tunnel).
  const cx = 0, cy = 0, cz = 0;
  const r = Math.max(spec.nx, spec.ny, spec.nz) * 1.4;
  let theta = Math.PI * 0.25; // azimuth
  let phi = Math.PI * 0.28;   // polar from +Y (eye-level above the tunnel)
  let dist = r;
  const target = { x: cx, y: cy, z: cz };
  const floorY = -spec.ny / 2;
  const FLOOR_MARGIN = 0.5;
  function clampPhi() {
    // Camera y = target.y + dist * cos(phi). Require camY >= floorY + margin.
    // => cos(phi) >= (floorY + margin - target.y) / dist
    const minCos = (floorY + FLOOR_MARGIN - target.y) / dist;
    if (minCos >= 1) { phi = 0; return; }     // camera must be at floor already
    if (minCos <= -1) return;                 // no clamp possible (dist too small)
    const maxPhi = Math.acos(minCos);
    if (phi > maxPhi) phi = maxPhi;
  }
  function update() {
    clampPhi();
    const x = target.x + dist * Math.sin(phi) * Math.cos(theta);
    const y = target.y + dist * Math.cos(phi);
    const z = target.z + dist * Math.sin(phi) * Math.sin(theta);
    return { pos: { x, y, z }, target };
  }
  function viewProj(aspect) {
    const { pos, target } = update();
    // Simple lookAt.
    const f = Vec3.normalize(Vec3.sub(target, pos));
    const r2 = Vec3.normalize(Vec3.cross(f, Vec3.Y));
    const u = Vec3.cross(r2, f);
    const view = new Float32Array(16);
    view[0] = r2.x; view[4] = r2.y; view[8]  = r2.z; view[12] = -Vec3.dot(r2, pos);
    view[1] = u.x;  view[5] = u.y;  view[9]  = u.z;  view[13] = -Vec3.dot(u, pos);
    view[2] = -f.x; view[6] = -f.y; view[10] = -f.z; view[14] = Vec3.dot(f, pos);
    view[3] = 0;    view[7] = 0;    view[11] = 0;    view[15] = 1;
    // Perspective. Column-major storage: in GL convention, the standard
    // right-handed perspective matrix has -1 at (row=3, col=2), which in
    // column-major flat storage is index 2*4+3 = 11. The translation B
    // lives at (row=2, col=3) = index 3*4+2 = 14.
    //
    //   proj = [ fW  0   0   0 ]   <- col 0
    //          [ 0   fH  0   0 ]   <- col 1
    //          [ 0   0   A  -1 ]   <- col 2 (A = -(F+N)/(F-N))
    //          [ 0   0   B   0 ]   <- col 3 (B = -2FN/(F-N))
    //
    // Reading column-by-column into flat indices:
    //   col 2: indices [8, 9, 10, 11] = [0, 0, A, -1]
    //   col 3: indices [12, 13, 14, 15] = [0, 0, B, 0]
    // Therefore: A at proj[10], -1 at proj[11], B at proj[14].
    const fov = Math.PI / 3;
    const fH = 1 / Math.tan(fov / 2);
    const fW = fH / aspect;
    const zNear = 0.1, zFar = dist * 6;
    const proj = new Float32Array(16);
    proj[0]  = fW;
    proj[5]  = fH;
    proj[10] = -(zFar + zNear) / (zFar - zNear);  // A
    proj[11] = -1;                                  // perspective-divide row
    proj[14] = -(2 * zFar * zNear) / (zFar - zNear); // B
    // Combined: invViewProj = inv(view * proj) = inv(proj) * inv(view)
    // vp = proj * view (column-vector convention: clip = proj * view * world).
    // The order matters: we need proj to act on view-space coordinates.
    const vp = mulMat4(proj, view);
    const invVp = invertMat4(vp);
    return { viewProj: vp, invViewProj: invVp, cameraPos: [pos.x, pos.y, pos.z] };
  }
  return {
    viewProj,
    get pos() { return update().pos; },
    drag(dx, dy) { theta -= dx * 0.005; phi -= dy * 0.005; phi = Math.max(0.05, Math.min(Math.PI - 0.05, phi)); },
    wheel(d) { dist *= (1 + d * 0.001); dist = Math.max(2, Math.min(500, dist)); },
    reset(spec) { theta = Math.PI * 0.25; phi = Math.PI * 0.28; dist = Math.max(spec.nx, spec.ny, spec.nz) * 1.4; },
  };
}

function mulMat4(a, b) {
  const o = new Float32Array(16);
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 4; j++) {
      o[j * 4 + i] =
        a[0 * 4 + i] * b[j * 4 + 0] +
        a[1 * 4 + i] * b[j * 4 + 1] +
        a[2 * 4 + i] * b[j * 4 + 2] +
        a[3 * 4 + i] * b[j * 4 + 3];
    }
  }
  return o;
}

function invertMat4(m) {
  // Closed-form 4x4 inverse via cofactor/adjugate. This is the
  // adjoint-by-expansion-along-the-first-row form; m is column-major.
  // Indexing convention: m[col*4 + row], so m[0]=M[0][0], m[5]=M[1][1],
  // m[10]=M[2][2], m[15]=M[3][3]. Each cofactor is the determinant of
  // the 3x3 minor obtained by deleting the row+col of that entry.
  const a00 = m[0],  a01 = m[4],  a02 = m[8],  a03 = m[12];
  const a10 = m[1],  a11 = m[5],  a12 = m[9],  a13 = m[13];
  const a20 = m[2],  a21 = m[6],  a22 = m[10], a23 = m[14];
  const a30 = m[3],  a31 = m[7],  a32 = m[11], a33 = m[15];

  // 2x2 helpers
  const sub = (a, b, c, d, e, f, g, h) =>
    (a * e - b * f) * (c * h - d * g) -
    (a * g - b * h) * (c * e - d * f) +
    (a * f - b * e) * (c * g - d * h) +  // mixed term (rarely needed)
    (a * h - b * g) * (c * f - d * e);

  // Actually use standard 3x3 det helper:
  const det3 = (a, b, c, d, e, f, g, h, i) =>
    a * (e * i - f * h) - b * (d * i - f * g) + c * (d * h - e * g);

  // Cofactors (with sign). Cof(i,j) = (-1)^(i+j) * minor(i,j).
  // We compute minors as determinants of the 3x3 left after deleting row+col.
  const c00 =  det3(a11, a12, a13, a21, a22, a23, a31, a32, a33);
  const c01 = -det3(a10, a12, a13, a20, a22, a23, a30, a32, a33);
  const c02 =  det3(a10, a11, a13, a20, a21, a23, a30, a31, a33);
  const c03 = -det3(a10, a11, a12, a20, a21, a22, a30, a31, a32);

  const c10 = -det3(a01, a02, a03, a21, a22, a23, a31, a32, a33);
  const c11 =  det3(a00, a02, a03, a20, a22, a23, a30, a32, a33);
  const c12 = -det3(a00, a01, a03, a20, a21, a23, a30, a31, a33);
  const c13 =  det3(a00, a01, a02, a20, a21, a22, a30, a31, a32);

  const c20 =  det3(a01, a02, a03, a11, a12, a13, a31, a32, a33);
  const c21 = -det3(a00, a02, a03, a10, a12, a13, a30, a32, a33);
  const c22 =  det3(a00, a01, a03, a10, a11, a13, a30, a31, a33);
  const c23 = -det3(a00, a01, a02, a10, a11, a12, a30, a31, a32);

  const c30 = -det3(a01, a02, a03, a11, a12, a13, a21, a22, a23);
  const c31 =  det3(a00, a02, a03, a10, a12, a13, a20, a22, a23);
  const c32 = -det3(a00, a01, a03, a10, a11, a13, a20, a21, a23);
  const c33 =  det3(a00, a01, a02, a10, a11, a12, a20, a21, a22);

  // Determinant (cofactor expansion along row 0)
  const det = a00 * c00 + a01 * c01 + a02 * c02 + a03 * c03;
  if (Math.abs(det) < 1e-12) throw new Error('mat4 not invertible');

  const invDet = 1 / det;
  const inv = new Float32Array(16);

  // Adjugate matrix = transpose of cofactor matrix.
  // adj[i][j] = cofactor(j, i). We want inv in column-major flat.
  // inv[col*4 + row] = adj[row][col] = cofactor(col, row).
  // So flat[c*4+r] = c_c_r where c_c_r is cofactor(row=r, col=c).

  inv[0]  =  c00 * invDet;
  inv[4]  =  c01 * invDet;
  inv[8]  =  c02 * invDet;
  inv[12] =  c03 * invDet;

  inv[1]  =  c10 * invDet;
  inv[5]  =  c11 * invDet;
  inv[9]  =  c12 * invDet;
  inv[13] =  c13 * invDet;

  inv[2]  =  c20 * invDet;
  inv[6]  =  c21 * invDet;
  inv[10] =  c22 * invDet;
  inv[14] =  c23 * invDet;

  inv[3]  =  c30 * invDet;
  inv[7]  =  c31 * invDet;
  inv[11] =  c32 * invDet;
  inv[15] =  c33 * invDet;

  return inv;
}

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'err-overlay';
  div.innerHTML = '<div class="box">' + String(msg).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</div>';
  document.body.appendChild(div);
}

/* =====================================================================

   ===================================================================== */

async function main() {
  const canvas = document.getElementById('render-canvas');
  const badge = document.getElementById('backend-badge');
  const fpsEl = document.getElementById('fps');
  const spsEl = document.getElementById('sps');
  const stepEl = document.getElementById('step');
  const spfEl = document.getElementById('spf');
  const cdEl = document.getElementById('cd');
  const fxEl = document.getElementById('fx');
  const densityStatsEl = document.getElementById('density-stats');
  const uInfInput = document.getElementById('u-inf');
  const uInfVal = document.getElementById('u-inf-val');
  const viscInput = document.getElementById('visc');
  const viscVal = document.getElementById('visc-val');
  const spfSlider = document.getElementById('spf-slider');
  const spfVal = document.getElementById('spf-val');
  const playBtn = document.getElementById('play');
  const stepBtn = document.getElementById('step-once');
  const resetBtn = document.getElementById('reset');
  const selftestBadge = document.getElementById('selftest-badge');
  const selftestLog = document.getElementById('selftest-log');
  const runSelftestBtn = document.getElementById('run-selftest');

  const spec = { nx: 32, ny: 24, nz: 24 };
  const defaultConfig = {
    nx: spec.nx, ny: spec.ny, nz: spec.nz,
    u_inf: parseFloat(uInfInput.value),
    rho0: 1.0,
    viscosity: parseFloat(viscInput.value),
    obstacles: [obstacleBox({ x: 6, y: 0, z: 0 }, { x: 3, y: 3, z: 3 })],
  };

  // GPU or CPU compute backend.
  // Default to CPU for now: WebGPU → WebGL2 cross-API texture sharing is
  // broken (readback pipeline drops frames / bleeds memory), so the WebGPU
  // path leaves the volumetric ray-march blank. The CPU path runs the
  // same JS solver, uploads density to the WebGL2 texture every frame,
  // and renders. Pass ?gpu=1 to opt back into WebGPU compute (FUTURE:
  // render volumetric directly in WebGPU render pass — no copy needed).
  const forceCpu = location.search.includes('gpu=1') ? false
                 : location.search.includes('cpu=1') ? true
                 : true;  // default CPU until WebGPU render pass exists
  // Diagnostic: ?debug=solid renders solid magenta (verifies shader+viewport).
  //              ?debug=alpha renders red wherever the volume accumulates
  //                (verifies ray-box intersection + texture sampling).
  let debugMode = 0;
  if (location.search.includes('debug=solid')) debugMode = 1;
  if (location.search.includes('debug=alpha')) debugMode = 2;
  window.__windsurfDebugMode = debugMode;
  let backend;
  try {
    backend = await createComputeBackend(spec, forceCpu);
  } catch (e) {
    showError('Failed to create compute backend: ' + e.message);
    return;
  }
  if (backend instanceof WebGPUCompute) {
    badge.textContent = 'WebGPU compute';
    badge.classList.add('gpu');
  } else {
    badge.textContent = 'CPU compute (WebGL2 render)';
    badge.classList.add('cpu');
  }

  // WebGL2 renderer.
  let renderer;
  try {
    renderer = createRenderer(canvas, spec);
    window.__windsurfRenderer = renderer;
  } catch (e) {
    showError('WebGL2 renderer init failed: ' + e.message);
    return;
  }

  // Wireframe obstacle renderer — the reliable visual layer. You always see
  // the obstacle geometry as lines, regardless of whether the volumetric
  // path is producing useful output. Toggle volumetric off with ?vol=0.
  let lines = null;
  try {
    lines = createLineRenderer(canvas);
    window.__windsurfLines = lines;
  } catch (e) {
    console.warn('Line renderer init failed:', e);
  }

  // Solid cube mesh renderer — the visible 3D obstacle inside the wind tunnel.
  // Tutorial-04 style: 6 colored faces, lit from above-right, depth-tested so
  // the wind tunnel teal volume occludes the back faces correctly.
  let cube = null;
  try {
    cube = createCubeRenderer(canvas);
    window.__windsurfCube = cube;
  } catch (e) {
    console.warn('Cube renderer init failed:', e);
  }
  // 6 face colors (R,G,B) — chosen to read clearly against the dark bg and
  // teal volume: +x green, -x magenta, +y bright yellow, -y dark blue,
  // +z cyan, -z orange. The cube reads as a real 3D object immediately.
  const CUBE_FACE_COLORS = [
    [0.35, 0.85, 0.45],  // +x (right, windward face): green
    [0.95, 0.40, 0.75],  // -x (left, leeward face): magenta
    [1.00, 0.95, 0.40],  // +y (top): yellow
    [0.30, 0.45, 0.85],  // -y (bottom): blue
    [0.45, 0.85, 1.00],  // +z (front): cyan
    [1.00, 0.60, 0.20],  // -z (back): orange
  ];
  // Fixed light direction (world space): from above-right-front.
  const LIGHT_DIR = [0.5, 0.8, 0.3];
  const showVolumetric = !location.search.includes('vol=0');

  const camera = makeCamera(spec);
  let playing = true;  // autostart so the user sees motion immediately
  let stepOnce = false;
  let simStepsPerFrame = parseInt(spfSlider.value, 10);
  let lastFrameTime = performance.now();
  let fps = 0;
  let simStepsThisSecond = 0;
  let simStepsPerSecond = 0;
  let lastStatsT = performance.now();
  let dragTimer = 0;

  // Streamline tracer — 80 streamlines, each carrying a 48-point trail.
  // Trails are drawn as line segments in the scene, with velocity-color
  // gradient (slow=dark blue, fast=bright orange). Together with the
  // cube and the dim tunnel walls, these show the wind actually flowing.
  const tracer = new StreamlineTracer(80, 48);
  tracer.seedInlet(spec.nx, spec.ny, spec.nz);
  window.__windsurfTracer = tracer;

  // Reset / state.
  function applyConfig() {
    const config = {
      nx: spec.nx, ny: spec.ny, nz: spec.nz,
      u_inf: parseFloat(uInfInput.value),
      rho0: 1.0,
      viscosity: parseFloat(viscInput.value),
      obstacles: [obstacleBox({ x: 6, y: 0, z: 0 }, { x: 3, y: 3, z: 3 })],
    };
    uInfVal.textContent = config.u_inf.toFixed(3);
    viscVal.textContent = config.viscosity.toFixed(3);
    spfVal.textContent = simStepsPerFrame;
    backend.reset(config);
    tracer.seedInlet(spec.nx, spec.ny, spec.nz);
    dragTimer = 0;
    // Refresh the line buffer: just the streamline trails (the wind itself).
    // The cube is solid; walls/markers were scaffolding and have been
    // removed — the streamlines ARE the tunnel now.
    if (lines) {
      lines.clearSegments();
      lines.addSegment(new Float32Array(0), [0.40, 0.75, 1.00, 0.85]);     // streamlines (empty placeholder, updated per frame)
    }
    // Refresh the solid cube mesh for the first box obstacle. Other shapes
    // (sphere/cylinder/torus) keep their wireframe-only rendering.
    if (cube) {
      const boxObs = config.obstacles.find((o) => o.shape === 'box');
      if (boxObs) {
        const m = buildCubeMesh(1, boxObs.transform.scale, boxObs.transform.position, CUBE_FACE_COLORS);
        cube.uploadMesh(m);
      } else {
        cube._vertexCount = 0;
      }
    }
  }
  applyConfig();

  // UI handlers.
  uInfInput.addEventListener('input', () => { uInfVal.textContent = parseFloat(uInfInput.value).toFixed(3); });
  viscInput.addEventListener('input', () => { viscVal.textContent = parseFloat(viscInput.value).toFixed(3); });
  uInfInput.addEventListener('change', applyConfig);
  viscInput.addEventListener('change', applyConfig);
  spfSlider.addEventListener('input', () => { simStepsPerFrame = parseInt(spfSlider.value, 10); spfVal.textContent = simStepsPerFrame; });
  playBtn.textContent = '⏸ Pause';
  playBtn.classList.toggle('primary', playing);
  playBtn.addEventListener('click', () => {
    playing = !playing;
    playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
    playBtn.classList.toggle('primary', playing);
  });
  stepBtn.addEventListener('click', () => { stepOnce = true; });
  resetBtn.addEventListener('click', () => { applyConfig(); });

  // Camera drag/zoom.
  canvas.addEventListener('mousedown', (e) => {
    let lastX = e.clientX, lastY = e.clientY;
    const move = (ev) => {
      camera.drag(ev.clientX - lastX, ev.clientY - lastY);
      lastX = ev.clientX; lastY = ev.clientY;
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
  canvas.addEventListener('wheel', (e) => { camera.wheel(e.deltaY); e.preventDefault(); }, { passive: false });
  window.addEventListener('keydown', (e) => { if (e.key === 'r' || e.key === 'R') camera.reset(spec); });

  // Self-test runner.
  const tr = new TestRunner();
  registerTests(tr);
  async function runSelfTest() {
    selftestBadge.textContent = 'self-test: running…';
    selftestBadge.className = 'running';
    selftestLog.innerHTML = '';
    const result = await tr.runAll();
    for (const r of result.log) {
      const line = document.createElement('div');
      line.className = r.status === 'PASS' ? 'pass' : 'fail';
      line.textContent = (r.status === 'PASS' ? '✓ ' : '✗ ') + r.name + (r.error ? ': ' + r.error : '');
      selftestLog.appendChild(line);
    }
    const tag = result.failed === 0 ? 'passed' : 'failed';
    selftestBadge.textContent = `self-test: ${result.passed}/${result.total} passed (${result.failed} failed)`;
    selftestBadge.className = tag;
    console.log(`[selftest] ${result.passed}/${result.total} passed`);
    if (result.failed > 0) console.table(result.log.filter(r => r.status === 'FAIL'));
    return result;
  }
  runSelftestBtn.addEventListener('click', runSelfTest);
  if (location.search.includes('selftest=1')) {
    // Run synchronously on load and freeze UI.
    runSelfTest().then((r) => {
      if (r.failed > 0) console.error('SELF-TEST FAILED — app may be broken');
    });
  }

  // Main loop.
  function tick() {
    const t0 = performance.now();
    const dt = t0 - lastFrameTime;
    lastFrameTime = t0;
    fps = fps * 0.9 + (1000 / Math.max(dt, 1)) * 0.1;

    if (playing || stepOnce) {
      const steps = playing ? simStepsPerFrame : 1;
      for (let i = 0; i < steps; i++) backend.step();
      // Advect the streamline tracer through the same velocity field.
      // dt=3.0 makes each tracer step large enough that 48-point trails
      // span many cells of the tunnel — visible curves, not dots.
      if (backend.solver) tracer.step(backend.solver, 3.0);
      simStepsThisSecond += steps;
      stepOnce = false;
    }

    // Drag recompute every ~10 frames (it's CPU-heavy and JS-side).
    dragTimer++;
    let dragReport = null;
    if (dragTimer >= 10) {
      dragTimer = 0;
      try {
        dragReport = backend.computeDrag ? backend.computeDrag(0) : null;
        if (backend.computeDragAsync) {
          backend.computeDragAsync(0).then(r => {
            cdEl.textContent = r.cd.toFixed(3);
            fxEl.textContent = r.force.x.toFixed(4);
          });
        }
      } catch (e) { /* ignore */ }
    }

    // Renderer upload + draw.
    try {
      // CPU path: synchronous density. WebGPU: readback once in a while.
      if (backend.density) {
        renderer.uploadVolume(backend.density);
        // Diagnostic: track density range so we can see if data is flowing.
        if (window.__densityStats !== false) {
          if (!window.__densityStats) {
            const d = backend.density;
            let mn = Infinity, mx = -Infinity, sum = 0, nz = 0;
            for (let i = 0; i < d.length; i++) {
              const v = d[i];
              if (v < mn) mn = v;
              if (v > mx) mx = v;
              if (v > 0.01) nz++;
              sum += v;
            }
            window.__densityStats = {mn, mx, mean: sum / d.length, nonzero: nz, total: d.length};
            console.log('[windsurf] density stats', window.__densityStats);
            densityStatsEl.textContent = `min=${mn.toFixed(2)} max=${mx.toFixed(2)} nonzero=${(nz/d.length*100).toFixed(0)}%`;
          }
        }
      } else if (backend.readback) {
        backend.readback().then(() => {
          if (backend.densityCpu) renderer.uploadVolume(backend.densityCpu);
        });
      }
      const aspect = canvas.clientWidth / canvas.clientHeight;
      const vp = camera.viewProj(aspect);
      if (showVolumetric) {
        renderer.draw({
          invViewProj: vp.invViewProj,
          cameraPos: vp.cameraPos,
          volumeMin: [-spec.nx / 2, -spec.ny / 2, -spec.nz / 2],
          volumeMax: [ spec.nx / 2,  spec.ny / 2,  spec.nz / 2],
          densityScale: 0.25,   // r10: tuned so bulk flow shows as faint teal, sphere hole reads as darker
          alphaScale: 0.08,     // product = 0.02 per sample → accumAlpha ≈ 0.92 (opaque bulk, hole visible)
          steps: 128,          // r9: doubled steps so the ray can resolve interior structure.
          fieldMode: 0,
          solidOpacity: 0.0,
          debugMode,
        });
      } else {
        // Volumetric off (e.g. ?vol=0) — clear canvas to background ourselves.
        const gl = renderer.gl;
        gl.clearColor(0.043, 0.051, 0.071, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }
      // Wireframe obstacle overlay — drawn on top regardless of volumetric
      // state so the user always sees the obstacle geometry.
      window.__windsurfLastState.viewProj = vp.viewProj;
      // Solid cube mesh — drawn between volumetric and wireframe so the
      // wireframe edges outline the same cube the user sees in solid form.
      if (cube && cube._vertexCount > 0) {
        cube.draw(vp.viewProj, LIGHT_DIR);
      }
      if (lines) {
        // Update streamlines every frame (they move). The streamlines are
        // the only segment after the wall/marker removal.
        if (backend.solver) {
          const streamGeom = buildStreamlineLines(tracer, backend.solver);
          lines.updateSegment(0, streamGeom);
        } else {
          lines.updateSegment(0, new Float32Array(0));
        }
        lines.draw(vp.viewProj);
      }
    } catch (e) {
      console.error('Render error:', e);
    }

    // Stats.
    if (t0 - lastStatsT > 500) {
      fpsEl.textContent = fps.toFixed(1);
      spsEl.textContent = simStepsPerSecond.toFixed(0);
      stepEl.textContent = backend.stepCount;
      spfEl.textContent = simStepsPerFrame;
      if (dragReport) {
        cdEl.textContent = dragReport.cd.toFixed(3);
        fxEl.textContent = dragReport.force.x.toFixed(4);
      } else if (!backend.computeDragAsync) {
        const r = backend.computeDrag ? backend.computeDrag(0) : null;
        if (r) {
          cdEl.textContent = r.cd.toFixed(3);
          fxEl.textContent = r.force.x.toFixed(4);
        }
      }
      simStepsPerSecond = simStepsThisSecond * (1000 / (t0 - lastStatsT));
      simStepsThisSecond = 0;
      lastStatsT = t0;
    }

    requestAnimationFrame(tick);
  }

  function resize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.resize(Math.max(1, w), Math.max(1, h));
  }
  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(tick);
}

window.addEventListener('error', (e) => {
  console.error('Uncaught error:', e.error || e.message);
  if (typeof showError === 'function') showError(String(e.error?.stack || e.message));
});

// Bootstrap only when a real DOM is present (skipped in Node test runner).
if (typeof document !== 'undefined' && document.getElementById('render-canvas')) {
  main().catch(e => {
    console.error(e);
    showError(e.stack || e.message);
  });
}
</script>
</body>
</html>
